name: Memory Loss

on:
  schedule:
    - cron: "0 23 1 * *" # 23:00 UTC on the 1st of each month
  workflow_dispatch:

jobs:
  memory-loss:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Record memory loss
        run: bun run memory-loss
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Build site
        run: bun run site

      - name: Configure git
        run: |
          git config user.name "Crest"
          git config user.email "crest-agent[bot]@users.noreply.github.com"

      - name: Commit changes
        run: |
          git add MEMORY_LOSS.md docs/
          git diff --cached --quiet || git commit -m "memory-loss: $(date -u +%Y-%m-%d)"
          git push
