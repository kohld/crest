name: Think

on:
  schedule:
    - cron: "0 9 * * *"  # 09:00 UTC — after ArXiv update
    - cron: "0 20 * * *" # 20:00 UTC — evening reflection
  workflow_dispatch:

jobs:
  think:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run think loop
        run: bun run think
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Configure git
        run: |
          git config user.name "Crest"
          git config user.email "crest-agent[bot]@users.noreply.github.com"

      - name: Commit THOUGHTS.md
        run: |
          git add THOUGHTS.md
          git diff --cached --quiet || git commit -m "think: daily reflection $(date -u +%Y-%m-%d)"
          git push
