name: Seedling

on:
  workflow_run:
    workflows: ["Self-Analysis"]
    types: [completed]
  workflow_dispatch:

jobs:
  seedling:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Configure git
        run: |
          git config user.name "Crest"
          git config user.email "crest-agent[bot]@users.noreply.github.com"

      - name: Run Seedling
        run: bun run seedling
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Build site
        run: bun run site

      - name: Commit NOTEBOOK.md and site
        run: |
          git add NOTEBOOK.md docs/
          git diff --cached --quiet || git commit -m "seedling: $(date -u +%Y-%m-%d)"
          git push
