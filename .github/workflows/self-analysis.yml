name: Self-Analysis

on:
  schedule:
    - cron: "0 22 * * *" # 22:00 UTC daily — after the evening think run
  workflow_dispatch:

jobs:
  self-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run self-analysis
        run: bun run self-analysis
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Configure git
        run: |
          git config user.name "Crest"
          git config user.email "crest-agent[bot]@users.noreply.github.com"

      - name: Build site
        run: bun run site

      - name: Commit changes
        run: |
          git add SELF_ANALYSIS.md docs/
          git diff --cached --quiet || git commit -m "self-analysis: $(date -u +%Y-%m-%d)"
          git push
